<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Interactive Trusted File</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 32px; line-height: 1.5; }
    button { font: inherit; padding: 12px 16px; border: 0; border-radius: 10px; background: #0a84ff; color: white; }
    output { display: block; margin-top: 16px; font-size: 28px; font-weight: 700; }
  </style>
</head>
<body>
  <h1>Interactive Trusted File</h1>
  <p>The button only updates the counter when JavaScript is allowed.</p>
  <button type="button" id="increment">Increment</button>
  <output id="count">0</output>
  <script>
    let count = 0;
    document.getElementById("increment").addEventListener("click", () => {
      count += 1;
      document.getElementById("count").textContent = count;
    });
  </script>
</body>
</html>
