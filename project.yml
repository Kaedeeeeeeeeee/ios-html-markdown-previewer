name: HTMLMarkdownPreviewer
options:
  bundleIdPrefix: com.kaede
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    CURRENT_PROJECT_VERSION: 4
    MARKETING_VERSION: 1.1
    SWIFT_VERSION: 6.0
packages:
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: 0.9.20
  SwiftMarkdown:
    url: https://github.com/swiftlang/swift-markdown.git
    from: 0.8.0
targets:
  HTMLMarkdownPreviewer:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HTMLMarkdownPreviewer
    dependencies:
      - package: ZIPFoundation
      - package: SwiftMarkdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaede.htmlmarkdownpreviewer
        INFOPLIST_FILE: HTMLMarkdownPreviewer/Info.plist
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_IDENTITY: Apple Distribution
          CODE_SIGN_STYLE: Manual
          DEVELOPMENT_TEAM: Y4FV6WUU4V
          PROVISIONING_PROFILE_SPECIFIER: HTML Markdown Previewer App Store
  HTMLMarkdownPreviewerTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HTMLMarkdownPreviewerTests
    dependencies:
      - target: HTMLMarkdownPreviewer
      - package: ZIPFoundation
      - package: SwiftMarkdown
        product: Markdown
    hostApplication: HTMLMarkdownPreviewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaede.htmlmarkdownpreviewer.tests
        INFOPLIST_FILE: HTMLMarkdownPreviewerTests/Info.plist
  HTMLMarkdownPreviewerUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HTMLMarkdownPreviewerUITests
    dependencies:
      - target: HTMLMarkdownPreviewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.kaede.htmlmarkdownpreviewer.uitests
        INFOPLIST_FILE: HTMLMarkdownPreviewerUITests/Info.plist
        TEST_TARGET_NAME: HTMLMarkdownPreviewer
schemes:
  HTMLMarkdownPreviewer:
    build:
      targets:
        HTMLMarkdownPreviewer: all
    test:
      targets:
        - HTMLMarkdownPreviewerTests
        - HTMLMarkdownPreviewerUITests
