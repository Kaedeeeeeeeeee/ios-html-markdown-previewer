name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  portable-release-materials:
    name: Portable Release Materials
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/capture-release-screenshots.sh
          bash -n scripts/archive-preflight.sh
          bash -n scripts/check-github-actions-execution.sh
          bash -n scripts/create-signed-archive.sh
          bash -n scripts/final-submission-preflight.sh
          bash -n scripts/portable-release-materials-audit.sh
          bash -n scripts/prepare-app-store-connect-run.sh
          bash -n scripts/prepare-final-smoke-run.sh
          bash -n scripts/prepare-physical-device-validation-run.sh
          bash -n scripts/prepare-release-packet.sh
          bash -n scripts/prepare-usability-test-packet.sh
          bash -n scripts/prepare-validation-samples.sh
          bash -n scripts/release-device-build.sh
          bash -n scripts/release-audit.sh
          bash -n scripts/run-archive-device-smoke.sh
          bash -n scripts/serve-validation-samples.sh
          bash -n scripts/verify-public-pages.sh

      - name: Run portable release materials audit
        run: scripts/portable-release-materials-audit.sh

      - name: Verify public privacy and support pages
        run: scripts/verify-public-pages.sh

  release-audit:
    name: Release Audit
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Validate shell scripts
        run: |
          bash -n scripts/capture-release-screenshots.sh
          bash -n scripts/archive-preflight.sh
          bash -n scripts/check-github-actions-execution.sh
          bash -n scripts/create-signed-archive.sh
          bash -n scripts/final-submission-preflight.sh
          bash -n scripts/portable-release-materials-audit.sh
          bash -n scripts/prepare-app-store-connect-run.sh
          bash -n scripts/prepare-final-smoke-run.sh
          bash -n scripts/prepare-physical-device-validation-run.sh
          bash -n scripts/prepare-release-packet.sh
          bash -n scripts/prepare-usability-test-packet.sh
          bash -n scripts/prepare-validation-samples.sh
          bash -n scripts/release-device-build.sh
          bash -n scripts/release-audit.sh
          bash -n scripts/run-archive-device-smoke.sh
          bash -n scripts/serve-validation-samples.sh
          bash -n scripts/verify-public-pages.sh

      - name: Run release audit
        run: scripts/release-audit.sh

  public-pages:
    name: Public App Store Pages
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Verify public privacy and support pages
        run: scripts/verify-public-pages.sh

  release-device-build:
    name: Release Device Build And Archive
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build generic iOS Release app
        run: scripts/release-device-build.sh

      - name: Create generic iOS archive preflight
        run: scripts/archive-preflight.sh

  test:
    name: Automated Tests
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -derivedDataPath DerivedData

      - name: Select iPhone simulator
        id: simulator
        run: |
          SIMULATOR_ID="$(
            python3 <<'PY'
          import json
          import subprocess
          import sys

          raw = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"], text=True)
          devices_by_runtime = json.loads(raw)["devices"]

          candidates = []
          for runtime, devices in devices_by_runtime.items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
                  continue
              version = tuple(int(part) for part in runtime.rsplit("iOS-", 1)[1].split("-"))
              for device in devices:
                  name = device.get("name", "")
                  if device.get("isAvailable", False) and name.startswith("iPhone"):
                      parts = name.split()
                      model = int(parts[1]) if len(parts) > 1 and parts[1].isdigit() else 0
                      if name.startswith("iPhone SE"):
                          variant = -1
                      elif name == f"iPhone {model}":
                          variant = 3
                      elif name.endswith(" Plus"):
                          variant = 2
                      elif name.endswith(" Pro") or name.endswith(" Pro Max"):
                          variant = 1
                      else:
                          variant = 0
                      candidates.append((version, model, variant, name, device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found")

          candidates.sort(reverse=True)
          version, _, _, name, udid = candidates[0]
          print(f"Selected simulator candidate: {name} iOS {'.'.join(map(str, version))}", file=sys.stderr)
          print(udid)
          PY
          )"
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $SIMULATOR_ID"

      - name: Run unit tests
        timeout-minutes: 15
        run: |
          xcodebuild test \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath DerivedData \
            -parallel-testing-enabled NO \
            -only-testing:HTMLMarkdownPreviewerTests

      - name: Reset simulator before UI smoke
        run: |
          xcrun simctl shutdown "${{ steps.simulator.outputs.id }}" || true
          xcrun simctl erase "${{ steps.simulator.outputs.id }}"

      - name: Run UI smoke test
        timeout-minutes: 10
        run: |
          xcodebuild test \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath DerivedData \
            -parallel-testing-enabled NO \
            -only-testing:HTMLMarkdownPreviewerUITests/SmokeUITests/testBuiltInSamplesAndSettingsSmoke
