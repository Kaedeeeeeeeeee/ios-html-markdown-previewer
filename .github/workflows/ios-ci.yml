name: iOS CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  release-audit:
    name: Release Audit
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate shell scripts
        run: |
          bash -n scripts/capture-release-screenshots.sh
          bash -n scripts/release-audit.sh

      - name: Run release audit
        run: scripts/release-audit.sh

  test:
    name: Unit Tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -derivedDataPath DerivedData

      - name: Select iPhone simulator
        id: simulator
        run: |
          SIMULATOR_ID="$(
            python3 <<'PY'
          import json
          import subprocess

          raw = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"], text=True)
          devices_by_runtime = json.loads(raw)["devices"]

          candidates = []
          for runtime, devices in devices_by_runtime.items():
              if not runtime.startswith("com.apple.CoreSimulator.SimRuntime.iOS-"):
                  continue
              version = tuple(int(part) for part in runtime.rsplit("iOS-", 1)[1].split("-"))
              for device in devices:
                  if device.get("isAvailable", False) and device.get("name", "").startswith("iPhone"):
                      candidates.append((version, device["name"], device["udid"]))

          if not candidates:
              raise SystemExit("No available iPhone simulator found")

          candidates.sort(reverse=True)
          print(candidates[0][2])
          PY
          )"
          echo "id=$SIMULATOR_ID" >> "$GITHUB_OUTPUT"
          echo "Selected simulator: $SIMULATOR_ID"

      - name: Run tests
        run: |
          xcodebuild test \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -configuration Debug \
            -destination "platform=iOS Simulator,id=${{ steps.simulator.outputs.id }}" \
            -derivedDataPath DerivedData
