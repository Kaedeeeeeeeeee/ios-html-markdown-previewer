name: App Store Upload

on:
  workflow_dispatch:
    inputs:
      submit_only:
        description: "Skip archive/upload and only select the existing build for review submission."
        required: false
        type: boolean
        default: false
      sync_store_assets:
        description: "Upload localized metadata and replace screenshots from the repository."
        required: false
        type: boolean
        default: true
      clean_screenshot_duplicates:
        description: "Remove exact duplicate screenshots and require five images per locale and device family."
        required: false
        type: boolean
        default: true
      submit_for_review:
        description: "Submit the selected build for App Review after upload verification."
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  upload:
    name: Archive and Upload Build
    runs-on: macos-26
    timeout-minutes: 90
    env:
      APP_IDENTIFIER: com.kaede.htmlmarkdownpreviewer
      APP_STORE_CONNECT_APP_ID: "6785794966"
      APP_STORE_CONNECT_VERSION_STRING: "1.1"
      APP_STORE_CONNECT_BUILD_NUMBER: "4"
      APP_STORE_CONNECT_PLATFORM: IOS
      APP_STORE_CONNECT_CLEAN_SCREENSHOT_DUPLICATES: ${{ inputs.clean_screenshot_duplicates }}
      APP_STORE_CONNECT_SUBMIT_FOR_REVIEW: ${{ inputs.submit_for_review }}
      APPLE_TEAM_ID: Y4FV6WUU4V
      ASC_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      ASC_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
      ASC_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare build paths
        run: |
          set -euo pipefail
          echo "ARCHIVE_PATH=$RUNNER_TEMP/HTMLPreviewer.xcarchive" >> "$GITHUB_ENV"
          echo "DERIVED_DATA_PATH=$RUNNER_TEMP/DerivedData" >> "$GITHUB_ENV"
          echo "EXPORT_PATH=$RUNNER_TEMP/AppStoreUpload" >> "$GITHUB_ENV"

      - name: Select Xcode 26.6
        if: ${{ github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          for developer_dir in \
            /Applications/Xcode_26.6_Release_Candidate_2.app/Contents/Developer \
            /Applications/Xcode_26.6.app/Contents/Developer \
            /Applications/Xcode.app/Contents/Developer; do
            if [[ -d "$developer_dir" ]]; then
              sudo xcode-select -s "$developer_dir"
              break
            fi
          done
          sw_vers
          xcodebuild -version
          xcodebuild -showsdks | grep -E 'iphoneos|iphonesimulator'

      - name: Install App Store Connect API key
        run: |
          set -euo pipefail
          if [[ -z "$ASC_API_KEY_ID" || -z "$ASC_API_ISSUER_ID" || -z "$ASC_API_KEY_BASE64" ]]; then
            echo "Missing App Store Connect API key secrets." >&2
            exit 2
          fi
          mkdir -p "$RUNNER_TEMP/private_keys"
          API_KEY_PATH="$RUNNER_TEMP/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"
          printf '%s' "$ASC_API_KEY_BASE64" | base64 -D -o "$API_KEY_PATH"
          chmod 600 "$API_KEY_PATH"
          echo "ASC_API_KEY_PATH=$API_KEY_PATH" >> "$GITHUB_ENV"

      - name: Resolve Swift packages
        if: ${{ github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          xcodebuild -resolvePackageDependencies \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -derivedDataPath "$DERIVED_DATA_PATH"

      - name: Archive with automatic App Store signing
        if: ${{ github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          xcodebuild archive \
            -project HTMLMarkdownPreviewer.xcodeproj \
            -scheme HTMLMarkdownPreviewer \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath "$ARCHIVE_PATH" \
            -derivedDataPath "$DERIVED_DATA_PATH" \
            -skipPackagePluginValidation \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID" \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            CODE_SIGN_IDENTITY= \
            PROVISIONING_PROFILE_SPECIFIER= \
            CODE_SIGNING_ALLOWED=YES

      - name: Inspect archive metadata
        if: ${{ github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          APP_INFO="$ARCHIVE_PATH/Products/Applications/HTMLMarkdownPreviewer.app/Info.plist"
          plutil -p "$APP_INFO" | grep -E 'BuildMachineOSBuild|CFBundleShortVersionString|CFBundleVersion|DTPlatformVersion|DTSDKName|DTXcode|DTXcodeBuild|MinimumOSVersion'

      - name: Upload archive to App Store Connect
        if: ${{ github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          EXPORT_OPTIONS="$RUNNER_TEMP/ExportOptions-upload.plist"
          cat > "$EXPORT_OPTIONS" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>destination</key>
            <string>upload</string>
            <key>manageAppVersionAndBuildNumber</key>
            <false/>
            <key>method</key>
            <string>app-store-connect</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>teamID</key>
            <string>Y4FV6WUU4V</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$EXPORT_OPTIONS" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$ASC_API_KEY_PATH" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"

      - name: Ensure fastlane is available
        if: ${{ inputs.sync_store_assets && github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          if ! command -v fastlane >/dev/null 2>&1; then
            brew install fastlane
          fi
          fastlane --version

      - name: Stage localized App Store screenshots
        if: ${{ inputs.sync_store_assets && github.event.inputs.submit_only != 'true' }}
        run: |
          set -euo pipefail
          SCREENSHOT_STAGING="$RUNNER_TEMP/AppStoreScreenshots"
          mkdir -p "$SCREENSHOT_STAGING"
          for locale in en-US zh-Hans ja; do
            cp -R "docs/app-store-screenshots/$locale" "$SCREENSHOT_STAGING/$locale"
          done
          screenshot_count="$(find "$SCREENSHOT_STAGING" -type f -name '*.png' | wc -l | tr -d ' ')"
          if [[ "$screenshot_count" != "30" ]]; then
            echo "Expected 30 localized App Store screenshots, found $screenshot_count." >&2
            exit 1
          fi
          echo "FASTLANE_SCREENSHOTS_PATH=$SCREENSHOT_STAGING" >> "$GITHUB_ENV"

      - name: Sync localized metadata and screenshots
        if: ${{ inputs.sync_store_assets && github.event.inputs.submit_only != 'true' }}
        env:
          FASTLANE_DISABLE_COLORS: "1"
          FASTLANE_SKIP_UPDATE_CHECK: "1"
          FASTLANE_METADATA_PATH: ${{ github.workspace }}/fastlane/metadata
        run: fastlane ios sync_store_assets

      - name: Verify uploaded build and optionally submit for review
        run: ruby .github/scripts/submit-app-store-review.rb

      - name: Upload export logs
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: app-store-upload-logs
          path: |
            ${{ runner.temp }}/AppStoreUpload
            ${{ runner.temp }}/ExportOptions-upload.plist
